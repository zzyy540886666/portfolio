<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目作品集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@300;400;500&family=Newsreader:ital,opsz,wght@0,16..72,400;0,16..72,500;0,16..72,600;1,16..72,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080c;
  --bg-card: #111117;
  --bg-card-hover: #16161f;
  --text: #e8e4dd;
  --text-muted: #8a8680;
  --text-dim: #5c5854;
  --accent: #d4a853;
  --accent-glow: rgba(212, 168, 83, 0.15);
  --border: #1e1e2a;
  --border-hover: #2a2a3a;
  --radius: 16px;
  --radius-sm: 10px;
  --font-heading: 'Newsreader', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.6;
  overflow-x: hidden;
}

/* Subtle static noise via tiny data URI - low perf cost */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.025;
  background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgL9eAAAACHRSTlMADw8fHycvP095fK4AAAAmSURBVDjLY2AYBaNgFIyCgQNMIJ3BAM9gEMCgKjcKRsEoGAWjAAAQqAABKbq1xAAAAABJRU5ErkJggg==");
}

/* Navigation */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 1.25rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8, 8, 12, 0.92);
  border-bottom: 1px solid transparent;
  transition: border-color 0.4s;
}

nav.scrolled {
  border-bottom-color: var(--border);
}

.nav-brand {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.02em;
}

.nav-brand span {
  color: var(--accent);
}

.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: color 0.3s;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--accent);
  transition: width 0.3s;
}

.nav-links a:hover { color: var(--text); }
.nav-links a:hover::after { width: 100%; }

/* Hero */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 8rem 2.5rem 4rem;
  position: relative;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeUp 0.8s 0.2s ease-out forwards;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(3.5rem, 8vw, 7rem);
  font-weight: 500;
  line-height: 1.05;
  letter-spacing: -0.03em;
  max-width: 900px;
  opacity: 0;
  animation: fadeUp 0.8s 0.35s ease-out forwards;
}

.hero h1 em {
  font-style: italic;
  color: var(--accent);
}

.hero-subtitle {
  font-size: 1.15rem;
  color: var(--text-muted);
  max-width: 560px;
  margin-top: 2rem;
  line-height: 1.7;
  font-weight: 300;
  opacity: 0;
  animation: fadeUp 0.8s 0.5s ease-out forwards;
}

.hero-stats {
  display: flex;
  gap: 4rem;
  margin-top: 4rem;
  opacity: 0;
  animation: fadeUp 0.8s 0.65s ease-out forwards;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-number {
  font-family: var(--font-mono);
  font-size: 2.5rem;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.03em;
}

.hero-stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 0.25rem;
}

/* Scroll indicator */
.scroll-indicator {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  opacity: 0;
  animation: fadeUp 0.8s 1s ease-out forwards;
}

.scroll-indicator span {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--text-dim), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}

/* Section */
.section {
  padding: 8rem 2.5rem;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.section-header {
  margin-bottom: 5rem;
}

.section-tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 0.75rem;
}

.section-header h2 {
  font-family: var(--font-heading);
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.section-header p {
  color: var(--text-muted);
  margin-top: 1rem;
  max-width: 500px;
  font-size: 1rem;
  line-height: 1.7;
}

/* Category toggle */
.category-nav {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 3rem;
  flex-wrap: wrap;
}

.category-btn {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 400;
  padding: 0.6rem 1.5rem;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.02em;
}

.category-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
}

.category-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: 500;
}

/* Project Grid */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 1.5rem;
}

.project-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer;
  position: relative;
  opacity: 0;
  transform: translateY(30px);
  content-visibility: auto;
  contain-intrinsic-size: auto 400px;
}

.project-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.project-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px -20px rgba(0,0,0,0.5);
}

.project-card-image {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  background: var(--bg-card);
  position: relative;
  overflow: hidden;
}

.project-card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.project-card:hover .project-card-image img {
  transform: scale(1.04);
}

.project-card-image .image-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a24, #12121a);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
}

.project-card-body {
  padding: 1.5rem;
}

.project-card-type {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
}

.project-card h3 {
  font-family: var(--font-heading);
  font-size: 1.35rem;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.3;
  margin-bottom: 0.5rem;
}

.project-card-desc {
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.6;
  margin-bottom: 1rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tech-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 1rem;
}

.tech-tag {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  background: rgba(255,255,255,0.04);
  color: var(--text-muted);
  border: 1px solid var(--border);
  letter-spacing: 0.02em;
}

.project-card-features {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.project-card-features li {
  font-size: 0.82rem;
  color: var(--text-dim);
  padding-left: 1rem;
  position: relative;
  line-height: 1.5;
}

.project-card-features li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
}

/* Card size variants */
.project-card.featured {
  grid-column: span 2;
}

/* Footer */
footer {
  padding: 6rem 2.5rem 3rem;
  text-align: center;
  border-top: 1px solid var(--border);
}

footer p {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Gaussian blur accent blobs */
.accent-blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
}

.accent-blob.top-right {
  width: 600px;
  height: 600px;
  background: var(--accent);
  top: -200px;
  right: -200px;
}

.accent-blob.bottom-left {
  width: 500px;
  height: 500px;
  background: #8b5cf6;
  bottom: -100px;
  left: -150px;
}

/* Responsive */
@media (max-width: 900px) {
  .projects-grid {
    grid-template-columns: 1fr;
  }
  .project-card.featured {
    grid-column: span 1;
  }
  nav {
    padding: 1rem 1.5rem;
  }
  .hero, .section {
    padding: 6rem 1.5rem 3rem;
  }
  .hero-stats {
    gap: 2rem;
  }
  .hero h1 {
    font-size: clamp(2.5rem, 10vw, 4rem);
  }
  .nav-links {
    gap: 1rem;
  }
}

@media (max-width: 480px) {
  .hero-stats {
    flex-wrap: wrap;
    gap: 1.5rem;
  }
  .hero-stat-number {
    font-size: 1.8rem;
  }
  .category-nav {
    overflow-x: auto;
    flex-wrap: nowrap;
    padding-bottom: 0.5rem;
  }
  .category-btn {
    white-space: nowrap;
  }
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 800px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 2.5rem;
  position: relative;
  transform: translateY(20px) scale(0.98);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-close {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  transition: all 0.3s;
}

.modal-close:hover {
  border-color: var(--text-muted);
  color: var(--text);
}

.modal img {
  width: 100%;
  border-radius: var(--radius-sm);
  margin-bottom: 1.5rem;
}

.modal h2 {
  font-family: var(--font-heading);
  font-size: 1.8rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
}

.modal .modal-type {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 1rem;
}

.modal .modal-desc {
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}

.modal .modal-section {
  margin-bottom: 1.5rem;
}

.modal .modal-section h4 {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.modal .modal-section p,
.modal .modal-section ul {
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.7;
}

.modal .modal-section ul {
  list-style: none;
  padding: 0;
}

.modal .modal-section ul li {
  padding-left: 1rem;
  position: relative;
  margin-bottom: 0.3rem;
}

.modal .modal-section ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
}
</style>
</head>

<div class="accent-blob top-right"></div>
<div class="accent-blob bottom-left"></div>

<nav id="nav">
  <div class="nav-brand">Port<span>folio</span></div>
  <ul class="nav-links">
    <li><a href="#hero">首页</a></li>

<section class="section" id="projects">

</section>

<footer id="footer">

</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">

  </div>
</div>

const categoryLabels = {
  web: '网站',
  software: '软件',
  miniapp: '小程序'
};

const grid = document.getElementById('projectsGrid');
const categoryBtns = document.querySelectorAll('.category-btn');
const modalOverlay = document.getElementById('modalOverlay');
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');
const modalClose = document.getElementById('modalClose');
const nav = document.getElementById('nav');

let activeCategory = 'all';

function renderProjects(filter = 'all') {
  const filtered = filter === 'all' ? projects : projects.filter(p => p.category === filter);
  grid.innerHTML = filtered.map((p, i) => {
    const firstImg = p.images[0];
    const imgSrc = firstImg ? firstImg : '';
    const catLabel = categoryLabels[p.category] || p.category;
    return `
      <div class="project-card" data-index="${i}" data-id="${p.id}" style="transition-delay: ${i * 0.06}s">
        <div class="project-card-image">
          ${imgSrc ? `<img src="${imgSrc}" alt="${p.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'image-placeholder\\'>${p.title}</div>'">` : `<div class="image-placeholder">${p.title}</div>`}
        </div>
        <div class="project-card-body">
          <div class="project-card-type">${p.type} · ${catLabel}</div>
          <h3>${p.title}</h3>
          <p class="project-card-desc">${p.desc}</p>
          <div class="tech-tags">
            ${p.tech.slice(0, 5).map(t => `<span class="tech-tag">${t}</span>`).join('')}
            ${p.tech.length > 5 ? `<span class="tech-tag">+${p.tech.length - 5}</span>` : ''}
          </div>
          <ul class="project-card-features">
            ${p.features.slice(0, 3).map(f => `<li>${f}</li>`).join('')}
          </ul>
        </div>
      </div>
    `;
  }).join('');

  // Re-observe
  observeCards();
}

function observeCards() {
  const cards = document.querySelectorAll('.project-card');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  cards.forEach(card => observer.observe(card));
}

categoryBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    categoryBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.category;
    renderProjects(activeCategory);
  });
});

// Initial render
renderProjects();

// Card click → modal
grid.addEventListener('click', (e) => {
  const card = e.target.closest('.project-card');
  if (!card) return;
  const id = parseInt(card.dataset.id);
  const project = projects.find(p => p.id === id);
  if (!project) return;

  modalContent.innerHTML = `
    ${project.images.length > 0 ? `<img src="${project.images[0]}" alt="${project.title}" onerror="this.style.display='none'">` : ''}
    <div class="modal-type">${project.type} · ${categoryLabels[project.category]}</div>
    <h2>${project.title}</h2>
    <p class="modal-desc">${project.desc}</p>
    <div class="modal-section">
      <h4>技术栈</h4>
      <div class="tech-tags">
        ${project.tech.map(t => `<span class="tech-tag">${t}</span>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <h4>核心功能</h4>
      <ul>
        ${project.features.map(f => `<li>${f}</li>`).join('')}
      </ul>
    </div>
    <div class="modal-section">
      <h4>项目详情</h4>
      <p>${project.detail}</p>
    </div>
    ${project.images.length > 1 ? `
    <div class="modal-section">
      <h4>更多截图</h4>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.75rem;margin-top:0.5rem;">
        ${project.images.slice(1).map(img => `<img src="${img}" alt="" style="border-radius:8px;width:100%;aspect-ratio:16/10;object-fit:cover;" onerror="this.style.display='none'">`).join('')}
      </div>
    </div>
    ` : ''}
  `;

  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
});

function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
});

// Nav scroll effect
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;
  nav.classList.toggle('scrolled', scrollY > 50);
  lastScroll = scrollY;
});
</script>
