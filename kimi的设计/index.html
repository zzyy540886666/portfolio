<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目作品集 | Portfolio</title>
  <meta name="description" content="个人项目介绍与作品展示" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0d;
      --surface: #141417;
      --surface-2: #1e1e24;
      --text: #f4f1ea;
      --muted: #9c9990;
      --accent: #ff4d00;
      --accent-2: #00d4aa;
      --border: rgba(244, 241, 234, 0.08);
      --radius: 18px;
      --transition: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background atmosphere */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 77, 0, 0.08), transparent 35%),
        radial-gradient(circle at 85% 30%, rgba(0, 212, 170, 0.06), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(255, 77, 0, 0.05), transparent 40%);
      pointer-events: none;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Typography */
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Layout */
    .container {
      width: min(1280px, 92vw);
      margin: 0 auto;
    }

    /* Header / Hero */
    header {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      padding: 10vh 0 8vh;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8vh;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .year {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
    }

    .hero-title {
      font-size: clamp(3.2rem, 10vw, 8.5rem);
      max-width: 14ch;
      margin-bottom: 2.5rem;
      background: linear-gradient(135deg, var(--text) 55%, var(--muted));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.35rem);
      max-width: 55ch;
      color: var(--muted);
      margin-bottom: 3.5rem;
      line-height: 1.7;
    }

    .stats {
      display: flex;
      gap: 3.5rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .scroll-hint {
      position: absolute;
      bottom: 4vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      color: var(--muted);
      font-size: 0.75rem;
      animation: float 2.5s ease-in-out infinite;
    }

    .scroll-hint svg {
      width: 24px;
      height: 24px;
      stroke: var(--muted);
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, 8px); }
    }

    /* Section */
    section {
      padding: 10vh 0;
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-end;
      gap: 2rem;
      margin-bottom: 4rem;
    }

    .section-title {
      font-size: clamp(2rem, 5vw, 3.8rem);
    }

    .section-title em {
      color: var(--accent);
      font-style: italic;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.65rem 1.2rem;
      cursor: pointer;
      transition: all 0.35s var(--transition);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.45s var(--transition), box-shadow 0.45s var(--transition), border-color 0.45s var(--transition);
      opacity: 0;
      transform: translateY(40px);
    }

    .project-card.revealed {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.8s var(--transition), transform 0.8s var(--transition), box-shadow 0.45s var(--transition), border-color 0.45s var(--transition);
    }

    .project-card.hidden {
      display: none;
    }

    .project-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      border-color: rgba(255, 77, 0, 0.35);
    }

    .card-media {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s var(--transition);
    }

    .project-card:hover .card-media img {
      transform: scale(1.06);
    }

    .card-media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(11, 11, 13, 0.7), transparent 45%);
      opacity: 0.8;
      transition: opacity 0.45s var(--transition);
    }

    .project-card:hover .card-media::after {
      opacity: 0.5;
    }

    .card-category {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 2;
      background: rgba(11, 11, 13, 0.65);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      color: var(--accent-2);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
    }

    .card-body {
      padding: 1.5rem;
    }

    .card-title {
      font-size: 1.35rem;
      margin-bottom: 0.8rem;
      transition: color 0.3s var(--transition);
    }

    .project-card:hover .card-title {
      color: var(--accent);
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .card-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      background: var(--surface-2);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .card-summary {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 6, 0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vh 4vw;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      position: relative;
      width: min(1100px, 100%);
      max-height: 92vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      transform: translateY(30px) scale(0.98);
      transition: transform 0.45s var(--transition);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-media {
      position: relative;
      background: #000;
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .modal-main-img {
      flex: 1;
      width: 100%;
      min-height: 0;
      object-fit: contain;
      background: radial-gradient(circle at center, #1a1a1f, #000);
    }

    .modal-thumbs {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.35);
      border-top: 1px solid var(--border);
    }

    .modal-thumb {
      width: 72px;
      height: 54px;
      flex: 0 0 auto;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.25s var(--transition);
    }

    .modal-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-thumb:hover,
    .modal-thumb.active {
      opacity: 1;
      border-color: var(--accent);
    }

    .modal-content {
      padding: 2.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    .modal-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .modal-category {
      color: var(--accent-2);
      border: 1px solid var(--border);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
    }

    .modal-title {
      font-size: 2rem;
      line-height: 1.15;
    }

    .modal-desc {
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.98rem;
    }

    .modal-features h4 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .modal-features ul {
      list-style: none;
      display: grid;
      gap: 0.6rem;
    }

    .modal-features li {
      position: relative;
      padding-left: 1.4rem;
      color: var(--text);
      font-size: 0.95rem;
    }

    .modal-features li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.55rem;
      width: 0.5rem;
      height: 0.5rem;
      background: var(--accent);
      border-radius: 50%;
    }

    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: auto;
      padding-top: 1rem;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      border-top: 1px solid var(--border);
      transition: gap 0.3s var(--transition);
    }

    .modal-link:hover {
      gap: 0.9rem;
    }

    .modal-close {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s var(--transition);
      z-index: 5;
    }

    .modal-close:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: rotate(90deg);
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s var(--transition);
      z-index: 5;
    }

    .modal-nav:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .modal-nav.prev { left: 1rem; }
    .modal-nav.next { right: 1rem; }

    /* Footer */
    footer {
      padding: 5vh 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }

      .modal {
        grid-template-columns: 1fr;
        max-height: 92vh;
      }

      .modal-media {
        min-height: 240px;
      }

      .modal-content {
        padding: 1.6rem;
      }

      .modal-nav {
        display: none;
      }
    }
  </style>
</head>

    const grid = document.getElementById('projectsGrid');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalPrev = document.getElementById('modalPrev');
    const modalNext = document.getElementById('modalNext');
    const modalMainImg = document.getElementById('modalMainImg');
    const modalThumbs = document.getElementById('modalThumbs');
    const modalCategory = document.getElementById('modalCategory');
    const modalTitle = document.getElementById('modalTitle');
    const modalTags = document.getElementById('modalTags');
    const modalDesc = document.getElementById('modalDesc');
    const modalFeatures = document.getElementById('modalFeatures');
    const modalLink = document.getElementById('modalLink');

    let activeProject = null;
    let activeImageIndex = 0;

    function renderProjects(filter = 'all') {
      grid.innerHTML = '';
      const filtered = filter === 'all' ? projects : projects.filter(p => p.category === filter);
      filtered.forEach((p, i) => {
        const card = document.createElement('article');
        card.className = 'project-card';
        card.style.transitionDelay = `${i * 60}ms`;
        card.innerHTML = `
          <div class="card-media">
            <span class="card-category mono">${p.categoryLabel}</span>
            <img src="${p.cover}" alt="${p.title}" loading="lazy" />
          </div>
          <div class="card-body">
            <h3 class="card-title">${p.title}</h3>
            <div class="card-tags">${p.tags.slice(0, 4).map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
            <p class="card-summary">${p.summary}</p>
          </div>
        `;
        card.addEventListener('click', () => openModal(p));
        grid.appendChild(card);
        requestAnimationFrame(() => card.classList.add('revealed'));
      });
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProjects(btn.dataset.filter);
      });
    });

    function openModal(p) {
      activeProject = p;
      activeImageIndex = 0;
      modalCategory.textContent = p.categoryLabel;
      modalTitle.textContent = p.title;
      modalDesc.textContent = p.desc;
      modalTags.innerHTML = p.tags.map(t => `<span class="card-tag">${t}</span>`).join('');
      modalFeatures.innerHTML = p.features.map(f => `<li>${f}</li>`).join('');
      if (p.link) {
        modalLink.href = p.link;
        modalLink.style.display = 'inline-flex';
      } else {
        modalLink.style.display = 'none';
      }
      updateGallery();
      modalOverlay.classList.add('open');
      modalOverlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      modalOverlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      activeProject = null;
    }

    function updateGallery() {
      if (!activeProject) return;
      const imgName = activeProject.images[activeImageIndex];
      modalMainImg.src = `../docs/${imgName}`;
      modalMainImg.alt = activeProject.title;
      modalThumbs.innerHTML = activeProject.images.map((img, i) => `
        <div class="modal-thumb ${i === activeImageIndex ? 'active' : ''}" data-index="${i}">
          <img src="../docs/${img}" alt="" loading="lazy" />
        </div>
      `).join('');
      modalThumbs.querySelectorAll('.modal-thumb').forEach(thumb => {
        thumb.addEventListener('click', () => {
          activeImageIndex = parseInt(thumb.dataset.index);
          updateGallery();
        });
      });
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });
    modalPrev.addEventListener('click', e => {
      e.stopPropagation();
      if (!activeProject) return;
      activeImageIndex = (activeImageIndex - 1 + activeProject.images.length) % activeProject.images.length;
      updateGallery();
    });
    modalNext.addEventListener('click', e => {
      e.stopPropagation();
      if (!activeProject) return;
      activeImageIndex = (activeImageIndex + 1) % activeProject.images.length;
      updateGallery();
    });
    document.addEventListener('keydown', e => {
      if (!modalOverlay.classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') modalPrev.click();
      if (e.key === 'ArrowRight') modalNext.click();
    });

    // Scroll reveal for static elements
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    renderProjects();

    // Re-observe cards after filter changes
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.project-card:not(.revealed)').forEach(card => revealObserver.observe(card));
    });
    observer.observe(grid, { childList: true });
  </script>
