<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目作品集 | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700;800&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.1);
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8vw;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, 50px) scale(1.1); }
        }

        .hero-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.2s;
        }

        .hero-title {
            font-family: 'Clash Display', sans-serif;
            font-size: clamp(48px, 8vw, 120px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.4s;
        }

        .hero-title .highlight {
            background: linear-gradient(135deg, var(--accent) 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 300;
            color: var(--text-secondary);
            max-width: 700px;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.6s;
        }

        .hero-stats {
            display: flex;
            gap: 64px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.8s;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-number {
            font-family: 'Clash Display', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Filter Section */
        .filter-section {
            padding: 80px 8vw 40px;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .filter-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 28px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: 'Satoshi', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
        }

        /* Projects Grid */
        .projects-section {
            padding: 80px 8vw 120px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
            margin-top: 40px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            opacity: 0;
            animation: cardFadeIn 0.6s ease forwards;
        }

        @keyframes cardFadeIn {
            to {
                opacity: 1;
            }
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, #00d4ff 100%);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.1);
        }

        .project-card:hover::before {
            transform: scaleX(1);
        }

        .project-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .project-card:hover .project-image {
            transform: scale(1.05);
        }

        .project-content {
            padding: 28px;
        }

        .project-category {
            display: inline-block;
            padding: 6px 14px;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .project-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .project-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-tag {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: block;
        }

        .modal-content {
            max-width: 1200px;
            margin: 40px auto;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            animation: modalSlideUp 0.4s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            position: relative;
            height: 400px;
            overflow: hidden;
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, var(--bg-card) 100%);
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .modal-close:hover {
            background: var(--accent);
            color: var(--bg-primary);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 48px;
            margin-top: -100px;
            position: relative;
        }

        .modal-category {
            display: inline-block;
            padding: 8px 16px;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .modal-section {
            margin-bottom: 32px;
        }

        .modal-section-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .modal-section-content {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .modal-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .modal-gallery img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                padding: 0 5vw;
            }

            .hero-stats {
                gap: 32px;
            }

            .stat-number {
                font-size: 36px;
            }

            .filter-section {
                padding: 40px 5vw 20px;
            }

            .filter-buttons {
                gap: 8px;
            }

            .filter-btn {
                padding: 10px 20px;
                font-size: 14px;
            }

            .projects-section {
                padding: 40px 5vw 80px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .modal-body {
                padding: 32px 24px;
            }

            .modal-title {
                font-size: 32px;
            }

            .modal-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 1s;
        }

        .scroll-indicator span {
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--text-secondary);
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>

        // 渲染项目卡片
        function renderProjects(filter = 'all') {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';

            const filtered = filter === 'all' 
                ? projects 
                : projects.filter(p => p.category === filter);

            filtered.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <img class="project-image" src="../docs/${project.images[0]}" alt="${project.title}">
                    <div class="project-content">
                        <div class="project-category">${project.categoryLabel}</div>
                        <h3 class="project-title">${project.title}</h3>
                        <p class="project-desc">${project.desc}</p>
                        <div class="project-tech">
                            ${project.tags.map(tag => `<span class="tech-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => openModal(project));
                grid.appendChild(card);
            });
        }

        // 打开模态框
        function openModal(project) {
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modalImage');
            const modalCategory = document.getElementById('modalCategory');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');

            modalImage.src = `../docs/${project.images[0]}`;
            modalCategory.textContent = project.categoryLabel;
            modalTitle.textContent = project.title;

            let contentHTML = `
                <div class="modal-section">
                    <div class="modal-section-title">项目概述</div>
                    <div class="modal-section-content">${project.overview}</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">技术架构</div>
                    <div class="modal-section-content">${project.tech}</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">核心功能</div>
                    <div class="modal-section-content">${project.features}</div>
                </div>
            `;

            if (project.solve) {
                contentHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">解决问题</div>
                        <div class="modal-section-content">${project.solve}</div>
                    </div>
                `;
            }

            if (project.images.length > 1) {
                contentHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">项目截图</div>
                        <div class="modal-gallery">
                            ${project.images.map(img => `<img src="../docs/${img}" alt="${project.title}">`).join('')}
                        </div>
                    </div>
                `;
            }

            modalContent.innerHTML = contentHTML;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        });

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                document.getElementById('modal').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // 筛选功能
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProjects(btn.dataset.filter);
            });
        });

        // 初始化
        renderProjects();
    </script>
